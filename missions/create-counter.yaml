id: create-counter
version: 1.1.0
goal: Scaffold, test, deploy, invoke, and verify an Anchor counter on devnet.
inputs:
  - name: workspace
    description: Absolute path for the new Anchor workspace.
  - name: project_name
    description: Anchor project and program name.
  - name: airdrop_amount
    required: false
    default: "1"
    description: Devnet SOL requested before deployment.
steps:
  - id: inspect-environment
    adapter: doctor
    operation: inspect
    acceptance:
      - type: command_succeeded
  - id: scaffold
    adapter: anchor
    operation: scaffold
    depends_on: [inspect-environment]
    arguments:
      workspace: "{{inputs.workspace}}"
      project_name: "{{inputs.project_name}}"
    preconditions:
      - type: path_not_exists
        parameters:
          path: "{{inputs.workspace}}"
    acceptance:
      - type: command_succeeded
  - id: apply-counter-template
    adapter: counter_template
    operation: apply
    depends_on: [scaffold]
    arguments:
      workspace: "{{inputs.workspace}}"
      project_name: "{{inputs.project_name}}"
      cluster: "{{runtime.cluster}}"
    cwd: "{{inputs.workspace}}"
    acceptance:
      - type: command_succeeded
      - type: result_equals
        parameters:
          path: metadata.file_count
          expected: 5
  - id: install-dependencies
    adapter: package
    operation: install
    depends_on: [apply-counter-template]
    cwd: "{{inputs.workspace}}"
    acceptance:
      - type: command_succeeded
  - id: build
    adapter: anchor
    operation: build
    depends_on: [install-dependencies]
    cwd: "{{inputs.workspace}}"
    acceptance:
      - type: command_succeeded
  - id: test
    adapter: anchor
    operation: test
    depends_on: [build]
    cwd: "{{inputs.workspace}}"
    acceptance:
      - type: command_succeeded
      - type: exit_code_equals
        parameters:
          value: 0
  - id: airdrop
    adapter: solana
    operation: airdrop
    depends_on: [test]
    arguments:
      amount: "{{inputs.airdrop_amount}}"
      cluster: "{{runtime.cluster}}"
      wallet: "{{runtime.wallet}}"
    acceptance:
      - type: command_succeeded
  - id: deploy
    adapter: anchor
    operation: deploy
    depends_on: [airdrop]
    cwd: "{{inputs.workspace}}"
    arguments:
      cluster: "{{runtime.cluster}}"
    acceptance:
      - type: command_succeeded
  - id: invoke
    adapter: package
    operation: run
    depends_on: [deploy]
    cwd: "{{inputs.workspace}}"
    arguments:
      script: interact:devnet
    acceptance:
      - type: command_succeeded
  - id: evidence
    adapter: evidence
    operation: assemble
    depends_on: [invoke]
    cwd: "{{inputs.workspace}}"
    arguments:
      mission: create-counter
    acceptance:
      - type: command_succeeded
      - type: result_equals
        parameters:
          path: metadata.verified
          expected: true
      - type: artifact_kind_exists
        parameters:
          kind: evidence.manifest
