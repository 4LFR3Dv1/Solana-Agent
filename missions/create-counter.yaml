id: create-counter
version: 1.1.0
goal: Scaffold, test, deploy, invoke, and verify an Anchor counter on devnet.
inputs:
  - name: workspace
    description: Absolute path for the new Anchor workspace.
  - name: project_name
    description: Anchor project and program name.
steps:
  - id: inspect-environment
    adapter: doctor
    operation: inspect
    acceptance:
      - type: command_succeeded
  - id: scaffold
    adapter: anchor
    operation: scaffold
    timeout_seconds: 120
    depends_on: [inspect-environment]
    arguments:
      workspace: "{{inputs.workspace}}"
      project_name: "{{inputs.project_name}}"
    preconditions:
      - type: path_not_exists
        parameters:
          path: "{{inputs.workspace}}"
    acceptance:
      - type: command_succeeded
  - id: apply-counter-template
    adapter: counter_template
    operation: apply
    depends_on: [scaffold]
    arguments:
      workspace: "{{inputs.workspace}}"
      project_name: "{{inputs.project_name}}"
      cluster: "{{runtime.cluster}}"
    cwd: "{{inputs.workspace}}"
    acceptance:
      - type: command_succeeded
      - type: result_equals
        parameters:
          path: metadata.file_count
          expected: 5
  - id: install-dependencies
    adapter: package
    operation: install
    timeout_seconds: 120
    depends_on: [apply-counter-template]
    cwd: "{{inputs.workspace}}"
    acceptance:
      - type: command_succeeded
  - id: build
    adapter: anchor
    operation: build
    timeout_seconds: 300
    depends_on: [install-dependencies]
    cwd: "{{inputs.workspace}}"
    acceptance:
      - type: command_succeeded
  - id: test
    adapter: anchor
    operation: test
    timeout_seconds: 300
    depends_on: [build]
    cwd: "{{inputs.workspace}}"
    acceptance:
      - type: command_succeeded
      - type: exit_code_equals
        parameters:
          value: 0
  - id: funding-check
    adapter: solana
    operation: require_balance
    depends_on: [test]
    arguments:
      minimum_lamports: 2000000000
      cluster: "{{runtime.cluster}}"
      wallet: "{{runtime.wallet}}"
    acceptance:
      - type: command_succeeded
  - id: deploy
    adapter: anchor
    operation: deploy
    timeout_seconds: 600
    depends_on: [funding-check]
    cwd: "{{inputs.workspace}}"
    arguments:
      cluster: "{{runtime.cluster}}"
    acceptance:
      - type: command_succeeded
  - id: invoke
    adapter: package
    operation: run
    timeout_seconds: 180
    depends_on: [deploy]
    cwd: "{{inputs.workspace}}"
    arguments:
      script: interact:devnet
    acceptance:
      - type: command_succeeded
  - id: evidence
    adapter: evidence
    operation: assemble
    depends_on: [invoke]
    cwd: "{{inputs.workspace}}"
    arguments:
      mission: create-counter
    acceptance:
      - type: command_succeeded
      - type: result_equals
        parameters:
          path: metadata.verified
          expected: true
      - type: artifact_kind_exists
        parameters:
          kind: evidence.manifest
