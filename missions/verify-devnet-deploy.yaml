id: verify-devnet-deploy
version: 1.3.0
goal: Verify a devnet Program ID and assemble independently checkable evidence.
inputs:
  - name: program_id
    description: Solana Program ID to verify.
  - name: counter_pubkey
    description: Counter account whose state must be verified.
  - name: deploy_signature
    description: Program deployment transaction signature.
  - name: initialize_signature
    description: Initialize transaction signature.
  - name: increment_signature
    description: Increment transaction signature.
  - name: expected_count
    required: false
    default: "1"
    description: Expected counter value encoded in the account.
steps:
  - id: evidence
    adapter: evidence
    operation: assemble
    arguments:
      mission: verify-devnet-deploy
      program_id: "{{inputs.program_id}}"
      counter_pubkey: "{{inputs.counter_pubkey}}"
      deploy_signature: "{{inputs.deploy_signature}}"
      initialize_signature: "{{inputs.initialize_signature}}"
      increment_signature: "{{inputs.increment_signature}}"
      expected_count: "{{inputs.expected_count}}"
    acceptance:
      - type: command_succeeded
      - type: result_equals
        parameters:
          path: metadata.verified
          expected: true
      - type: artifact_kind_exists
        parameters:
          kind: evidence.manifest
