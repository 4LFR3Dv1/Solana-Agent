services:
  solana-agent:
    build:
      context: ..
      dockerfile: environment/Dockerfile
    user: "${SOLANA_AGENT_UID:-1000}:${SOLANA_AGENT_GID:-1000}"
    working_dir: /workspace
    environment:
      HOME: /tmp/solana-agent-home
      CARGO_HOME: /tmp/solana-agent-home/.cargo
    volumes:
      - ..:/workspace
    ports:
      - "8899:8899"
      - "8900:8900"
    security_opt:
      - no-new-privileges:true
      - seccomp:unconfined
    cap_drop:
      - ALL
    command: ["bash", "-lc", "mkdir -p \"$$HOME\" && sleep infinity"]
